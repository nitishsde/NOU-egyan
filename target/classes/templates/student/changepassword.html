<!doctype html>
<html lang="en" th:replace="student/studentbase::layout(~{::section})">
  <head>
   
  </head>
  <body>
    <section>
		<div class="row">
			<div style="margin-left: 65px; margin-bottom: 10px;"><span style="font-weight: bold; color: rgb(99, 98, 98);">STUDENT</span><span style="color: #FFA500; border: 2px;"> _________________</span>
			       <p style="font-size: 28px; font-weight: bold;">CHANGE<span style="color: #8B0000;"> PASSWORD</span></p></div>

			<div th:if="${msg}">
				<p th:text="${msg}" style="text-align: center; color: red;"></p>
			</div>
			<form class="form-group shadow" method="post">
						<table class="table table-bordered" style="margin:auto;width:60%;">
							<tr>
								<td><i class="fa-solid fa-key"></i> Enter Old Password</td>
								<td>
									<input type="password"  name="oldpassword" class="form-control" style="color:black; background-color:white;" required/>
								</td>
							</tr>
							<tr>
								<td><i class="fa-solid fa-key"></i> Enter New Password</td>
								<td>
									<input type="password" name="newpassword" class="form-control" style="color:black; background-color:white;"  required/>
								</td>
							</tr>
							<tr>
							<td><i class="fa-solid fa-key"></i> Enter Confirm Password</td>
							<td>
							<input type="password" name="confirmpassword" class="form-control" style="color:black; background-color:white;"  required/>
							</td>
							</tr>
							<tr>
								<td></td>
								<td>
									<button type="submit" class="btn py-3 mb-5" style="background-color:#8B0000; font-weight:bold; color:white">Change Password</button>
								</td>
							</tr>
						</table>
					</form>

		</div>
	</section>
  </body>
</html>
